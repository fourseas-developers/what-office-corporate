<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What? Office | 事業用不動産仲介</title>
  <meta name="description" content="What? Officeは、Webサイトを中心に情報発信を行いながら、オフィス・店舗の物件探しから契約までをサポートする事業用不動産仲介会社です。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,300;6..72,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --ink: #161513;
  --paper: #f6f4ef;
  --surface: #ffffff;
  --muted: #6f6a60;
  --muted-light: #9b968c;
  --line: #ede9e1;
  --line-strong: #e3dfd6;
  --accent: #60766a;
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--surface);
  color: var(--ink);
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  line-height: 1.8;
  letter-spacing: 0;
}

img {
  display: block;
  max-width: 100%;
}

a {
  color: inherit;
  text-decoration: none;
}

.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  padding: 26px 72px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
}

.brand {
  display: inline-flex;
  align-items: baseline;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
}

.brand-name {
  color: var(--ink);
  font-family: "Space Grotesk", sans-serif;
  font-size: 13px;
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
}

.nav {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 30px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
}

.nav a {
  padding: 4px 0;
}

.nav a:hover,
.nav a:focus-visible {
  color: var(--ink);
}

.hero {
  position: relative;
  padding: 172px 64px 120px;
  overflow: hidden;
  text-align: center;
  isolation: isolate;
}

.hero-image,
.hero-overlay {
  display: none;
}

.hero-inner {
  width: min(100%, 760px);
  margin: 0 auto;
}

.eyebrow,
.section-kicker {
  margin: 0 0 14px;
  color: var(--muted-light);
  font-family: "Space Grotesk", sans-serif;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: 0.32em;
}

.hero .eyebrow {
  margin-bottom: 48px;
  letter-spacing: 0.34em;
}

.hero-title {
  display: block;
  max-width: 760px;
  margin: 0 auto 40px;
  font-family: "Space Grotesk", "Noto Sans JP", sans-serif;
  font-size: 64px;
  font-weight: 600;
  line-height: 1.2;
}

.hero-title span {
  display: block;
}

.title-set {
  display: grid;
  gap: 0;
}

.hero-title .title-mobile {
  display: none;
}

.hero-copy {
  max-width: 480px;
  margin: 0 auto 48px;
  color: var(--muted);
  font-size: 14px;
  line-height: 2.1;
}

.hero-copy span {
  display: block;
}

.hero-copy span:first-child {
  color: var(--ink);
  font-size: 18px;
  font-weight: 700;
}

.button-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: fit-content;
  min-height: 50px;
  margin-top: 0;
  padding: 15px 30px;
  border: 1px solid var(--ink);
  border-radius: 0;
  color: var(--ink);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  transition: background 160ms ease, color 160ms ease;
}

.button-link:hover,
.button-link:focus-visible,
.button-link.dark:hover,
.button-link.dark:focus-visible {
  background: var(--ink);
  color: #fff;
}

.button-link.dark {
  min-height: 54px;
  padding: 17px 34px;
  background: var(--ink);
  color: #fff;
}

.button-link.dark:hover,
.button-link.dark:focus-visible {
  background: var(--accent);
  border-color: var(--accent);
}

.button-arrow {
  font-family: "Space Grotesk", sans-serif;
  line-height: 1;
}

.visual-strip {
  display: grid;
  grid-template-columns: 1fr;
  height: 280px;
  overflow: hidden;
  border-top: 1px solid var(--line-strong);
  border-bottom: 1px solid var(--line-strong);
}

.visual-strip img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  object-position: center;
}

.visual-strip img + img {
  display: none;
}

.section {
  padding: 112px 64px;
  background: var(--surface);
  text-align: center;
}

.section-muted,
.contact-section {
  background: var(--paper);
  border-top: 1px solid #e7e3da;
}

.section-inner {
  width: min(100%, 1040px);
  margin: 0 auto;
}

.intro-band,
.intro-grid {
  display: none;
}

.section-heading {
  margin: 0 0 64px;
  text-align: center;
}

.section-subtitle {
  margin: -8px 0 22px;
  color: var(--ink);
  font-size: 16px;
  font-weight: 500;
  line-height: 1.5;
}

.section-title {
  margin: 0;
  font-family: "Newsreader", "Noto Sans JP", serif;
  font-size: 30px;
  font-weight: 300;
  line-height: 1.45;
}

.lead-text {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 2;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 48px;
  max-width: 840px;
  margin: 0 auto;
}

.service-item {
  min-height: 0;
  padding: 0;
  background: transparent;
}

.service-item:only-child {
  max-width: 860px;
  margin: 0 auto;
}

.service-number {
  display: block;
  margin-bottom: 16px;
  color: #b6b0a3;
  font-family: "Space Grotesk", sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2em;
}

.service-item h3 {
  margin: 0 0 12px;
  color: var(--ink);
  font-size: 17px;
  font-weight: 600;
  line-height: 1.55;
}

.service-item p,
.body-copy p {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.95;
}

.service-item p + p,
.body-copy p + p {
  margin-top: 18px;
}

.about-layout {
  display: block;
  max-width: 680px;
  margin: 0 auto;
}

.image-panel {
  display: none;
}

.about-copy {
  max-width: none;
}

.about-copy .section-title {
  max-width: 680px;
  margin: 0 auto;
  font-size: 36px;
  line-height: 1.6;
}

.body-copy {
  display: grid;
  gap: 14px;
  max-width: 640px;
  margin: 36px auto 0;
}

.body-copy p {
  color: #5f5b53;
  font-size: 15px;
  line-height: 2.2;
}

.company-layout {
  display: block;
  max-width: 680px;
  margin: 0 auto;
}

.company-layout .section-heading {
  margin-bottom: 52px;
}

.company-list {
  display: grid;
  grid-template-columns: 180px 1fr;
  row-gap: 20px;
  column-gap: 24px;
  margin: 0;
  text-align: left;
  font-size: 14px;
}

.company-row {
  display: contents;
}

.company-row dt {
  color: var(--muted-light);
  font-weight: 400;
}

.company-row dd {
  margin: 0;
}

.contact-layout {
  display: block;
  max-width: 680px;
  margin: 0 auto;
}

.contact-section .section-heading {
  margin-bottom: 0;
}

.contact-section .section-title {
  margin-bottom: 16px;
  font-size: 40px;
}

.contact-action {
  display: grid;
  justify-items: center;
  gap: 28px;
}

.contact-action .lead-text {
  max-width: 480px;
  margin: 0 auto;
}

.site-footer {
  padding: 44px 72px;
  background: var(--ink);
  color: #cfcabf;
  font-size: 11px;
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  width: min(100%, 1180px);
  margin: 0 auto;
}

.footer-inner span:first-child {
  color: #fff;
  font-family: "Newsreader", serif;
  font-size: 18px;
}

.footer-inner span:last-child {
  color: #8d887d;
  font-family: "Space Grotesk", sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
}

.options-page {
  background: var(--surface);
}

.options-hero {
  padding-bottom: 56px;
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 28px;
  max-width: 980px;
  margin: 0 auto;
}

.option-card {
  margin: 0;
  overflow: hidden;
  border: 1px solid var(--line-strong);
  background: var(--surface);
}

.option-card img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.option-card figcaption {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 18px;
  color: var(--muted);
  font-size: 13px;
}

.option-card strong {
  color: var(--ink);
  font-size: 15px;
}

@media (max-width: 860px) {
  .site-header {
    align-items: flex-start;
    flex-direction: column;
    padding: 22px 20px;
  }

  .nav {
    width: 100%;
    justify-content: flex-start;
    gap: 8px 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    white-space: nowrap;
  }

  .hero {
    padding: 96px 20px 78px;
    text-align: left;
  }

  .hero .eyebrow {
    margin-bottom: 32px;
  }

  .hero-title {
    font-size: clamp(42px, 12vw, 56px);
    line-height: 1.45;
  }

  .hero-inner,
  .hero-title,
  .hero-copy {
    margin-left: 0;
    margin-right: 0;
  }

  .hero-title .title-desktop {
    display: none;
  }

  .hero-title .title-mobile {
    display: grid;
  }

  .section {
    padding: 86px 20px;
    text-align: left;
  }

  .section-heading {
    text-align: left;
  }

  .visual-strip,
  .visual-strip img {
    height: 220px;
  }

  .service-grid,
  .options-grid {
    grid-template-columns: 1fr;
    gap: 44px;
    max-width: 520px;
    margin-left: 0;
    margin-right: 0;
  }

  .about-layout,
  .company-layout,
  .contact-layout,
  .about-copy .section-title,
  .body-copy,
  .contact-action .lead-text {
    margin-left: 0;
    margin-right: 0;
  }

  .about-copy .section-title {
    font-size: 32px;
  }

  .company-list {
    grid-template-columns: 1fr;
    row-gap: 6px;
  }

  .company-row dt {
    margin-top: 16px;
  }

  .company-row:first-child dt {
    margin-top: 0;
  }

  .contact-action {
    justify-items: start;
  }

  .footer-inner {
    align-items: flex-start;
    flex-direction: column;
  }
}

@media (max-width: 520px) {
  .brand-mark {
    width: 24px;
    height: 24px;
  }

  .brand-name {
    font-size: 12px;
  }

  .nav {
    font-size: 12px;
  }

  .hero-copy,
  .body-copy p,
  .lead-text {
    font-size: 13px;
  }

  .button-link {
    width: 100%;
  }
}

</style>
</head>

  <script>
(function () {
  const content = window.WHAT_OFFICE_CONTENT;

  function byId(id) {
    return document.getElementById(id);
  }

  function visualById(id) {
    return content.visuals.find((visual) => visual.id === id) || content.visuals[0];
  }

  function renderNav() {
    const nav = byId("site-nav");
    nav.innerHTML = content.nav
      .map((item) => `<a href="${item.href}">${item.label}</a>`)
      .join("");
  }

  function renderHero() {
    const heroVisual = visualById(content.hero.visualId);
    byId("hero-image").src = heroVisual.src;
    byId("hero-image").alt = heroVisual.title;
    byId("hero-kicker").textContent = content.hero.kicker;
    byId("hero-title").innerHTML = `
      <span class="title-set title-desktop">
        ${content.hero.titleLines.map((line) => `<span>${line}</span>`).join("")}
      </span>
      <span class="title-set title-mobile">
        ${(content.hero.mobileTitleLines || content.hero.titleLines).map((line) => `<span>${line}</span>`).join("")}
      </span>
    `;
    byId("hero-copy").innerHTML = (content.hero.copyLines || [content.hero.copy])
      .map((line) => `<span>${line}</span>`)
      .join("");
  }

  function renderServices() {
    const isSingleService = content.services.length === 1;
    byId("services-list").innerHTML = content.services
      .map((service, index) => `
        <article class="service-item">
          ${isSingleService ? "" : `<span class="service-number">${String(index + 1).padStart(2, "0")}</span>`}
          ${isSingleService ? "" : `<h3>${service.title}</h3>`}
          <p>${service.text}</p>
        </article>
      `)
      .join("");
  }

  function renderAbout() {
    const aboutVisual = visualById(content.about.visualId);
    byId("about-image").src = aboutVisual.src;
    byId("about-image").alt = aboutVisual.title;
    byId("about-kicker").textContent = content.about.kicker;
    byId("about-subtitle").textContent = content.about.subtitle;
    byId("about-title").textContent = content.about.title;
    byId("about-body").innerHTML = content.about.paragraphs
      .map((paragraph) => `<p>${paragraph}</p>`)
      .join("");
  }

  function renderCompany() {
    byId("company-list").innerHTML = content.company
      .map(([label, value]) => `
        <div class="company-row">
          <dt>${label}</dt>
          <dd>${value}</dd>
        </div>
      `)
      .join("");
  }

  function renderVisualStrip() {
    const stripA = visualById(content.visualSlots.stripA);
    const stripB = visualById(content.visualSlots.stripB);
    byId("strip-image-a").src = stripA.src;
    byId("strip-image-a").alt = stripA.title;
    byId("strip-image-b").src = stripB.src;
    byId("strip-image-b").alt = stripB.title;
  }

  function renderContact() {
    byId("contact-lead").textContent = content.contact.lead;
    byId("contact-link").href = content.contact.formUrl;
  }

  renderNav();
  renderHero();
  renderServices();
  renderAbout();
  renderCompany();
  renderVisualStrip();
  renderContact();
  byId("footer-year").textContent = new Date().getFullYear();
})();
